# ============================================================
# 螺母缺失检测数据集配置文件
# 用于 YOLOv11 训练/验证/测试
#
# 使用方法：将此文件放到项目根目录（或任何方便的位置），
# 然后在 train.py 中指定 data="missing.yaml"
#
# 注意：path 为数据集根目录的绝对路径，请根据实际情况修改
# ============================================================

# 数据集根目录（请修改为你的实际路径）
path: ./datasets/missing
train: images/train
val: images/val
test: images/test

# 类别数量
nc: 2

# 类别名称（ID 从 0 开始）
names:
  0: Nut_Missing   # 螺母缺失
  1: Empty_Hole     # 空孔
